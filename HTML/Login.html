<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/login.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UMUYOBORO TV | Secure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div id="toast"></div>

<div class="login-box">

<h1>UMUYOBORO TV</h1>
<p>Secure Login Panel</p>

<div id="lockMsg"></div>

<form id="form">

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input id="username" type="text" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input id="password" type="password" placeholder="Password" required>
<i class="fa-solid fa-eye eye" id="toggle"></i>
</div>

<button type="submit">Login</button>

</form>

</div>

<script>
const form=document.getElementById("form");
const user=document.getElementById("username");
const pass=document.getElementById("password");
const toast=document.getElementById("toast");
const toggle=document.getElementById("toggle");
const lockMsg=document.getElementById("lockMsg");

const USER="admin";
const PASSWORD="12345";

let attempts=0;
let locked=false;

function show(msg){
toast.textContent=msg;
toast.style.display="block";
setTimeout(()=>{
toast.style.display="none";
},2000);
}

toggle.onclick=()=>{
pass.type=pass.type==="password"?"text":"password";
toggle.classList.toggle("fa-eye-slash");
};

function lock(){
locked=true;
lockMsg.textContent="Too many attempts. Try again in 10 seconds.";

setTimeout(()=>{
locked=false;
attempts=0;
lockMsg.textContent="";
},10000);
}

form.addEventListener("submit",(e)=>{
e.preventDefault();

if(locked){
show("Locked. Wait...");
return;
}

if(user.value===USER && pass.value===PASSWORD){

show("Login Success ✔");

setTimeout(()=>{
window.location.href="index.html";
},1000);

}else{

attempts++;
show("Wrong Username or Password ❌");

if(attempts>=3){
lock();
}
}
});
</script>

</body>
</html>
