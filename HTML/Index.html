<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">

 <!-- CSS -->
  <link rel="stylesheet" href="../css/index.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UMUYOBORO TV | Gospel & Live Programs</title>

  <meta name="description" content="UMUYOBORO TV - Inyigisho, ubutumwa bwiza na Live programs.">
  <meta name="keywords" content="Gospel Rwanda, Teaching, Live TV, UMUYOBORO TV">
  <meta name="author" content="UMUYOBORO TV">

 

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="logo.png" alt="UMUYOBORO TV Logo">
    <div>
      <h2>UMUYOBORO TV</h2>
      <p>Gospel • Teaching • Live</p>
    </div>
  </div>

  <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
    <i class="fa fa-bars"></i>
  </button>

  <nav id="menu">
    <a href="#home" class="active">Home</a>
    <a href="#videos">Videos</a>
    <a href="#live">Live</a>
    <a href="#contact">Contact</a>
    <a href="pages/login.html">Login</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Murakaza neza kuri UMUYOBORO TV</h1>
  <p>Inyigisho, ubutumwa bwiza na Live programs.</p>
</section>

<!-- SLIDER -->
<section class="slider">
  <img id="slider-image" src="File.png" alt="slider image">
</section>

<!-- LIVE STATUS -->
<section class="live-status">
  <p>🔴 Live Status: <span id="status">OFFLINE</span></p>
</section>

<!-- VIDEOS -->
<section id="videos">
  <h2>Videos</h2>

  <div class="video-container">
    <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/Tha95QEdV-M" allowfullscreen></iframe>
  </div>
</section>

<!-- LIVE -->
<section id="live">
  <h2>LIVE TV</h2>
  <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" allowfullscreen></iframe>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>

  <form onsubmit="sendMessage(event)">
    <input id="name" type="text" placeholder="Amazina yawe" required>
    <input id="email" type="email" placeholder="Email yawe" required>
    <textarea id="message" placeholder="Ubutumwa bwawe" required></textarea>
    <button type="submit">Ohereza</button>
  </form>

  <p>📧 umuyoborotv@gmail.com</p>
  <p>📞 +250 7XXXXXXXX</p>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/2507XXXXXXXX" target="_blank">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<!-- BACK TO TOP -->
<button class="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- FOOTER -->
<footer>
  <h3>UMUYOBORO TV</h3>
  <p>© <span id="year"></span> All rights reserved</p>
</footer>

<!-- SCRIPT -->
<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}

/* LOADER */
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

/* SLIDER */
const images = ["File.png","Img.jpg","Img.png"];
let i = 0;

setInterval(() => {
  document.getElementById("slider-image").src = images[i];
  i = (i + 1) % images.length;
}, 3000);

/* CONTACT */
function sendMessage(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  window.location.href =
    `mailto:umuyoborotv@gmail.com?subject=${name}&body=${email}%0A%0A${message}`;
}
</script>

</body>
</html>
